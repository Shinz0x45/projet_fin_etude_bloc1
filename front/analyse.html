<!-- analysis.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse Financière</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- APP CONTAINER -->
  <div class="app-container">

    <!-- HEADER -->
    <header class="topbar">
      <button class="icon-btn" aria-label="Retour" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="profile">
        <div>
          <p class="welcome">Bienvenue</p>
          <h1>Rémi</h1>
        </div>
        <img src="/front/assets/img/pdp_anonyme.png" alt="Photo de profil" class="avatar" />
      </div>
    </header>

    <main>

      <!-- SUMMARY -->
      <section class="summary-card" aria-labelledby="summary-title">
        <p class="summary-label">Dépenses ce mois</p>
        <h2 id="summary-title">€ 2,845.00</h2>
        <div class="summary-footer">
          <div>
            <small>Budget</small>
            <h5>€ 5,000</h5>
          </div>
          <div>
            <small>Restant</small>
            <h5>€ 2,155</h5>
          </div>
        </div>
      </section>

      <!-- STATS -->
      <section class="stats-row" aria-label="Statistiques">
        <article class="stats-card">
          <h3>Revenus</h3>
          <p class="positive">+ € 4,200</p>
        </article>
        <article class="stats-card">
          <h3>Dépenses</h3>
          <p class="negative">- € 2,845</p>
        </article>
      </section>

      <!-- CHART -->
      <section class="chart-card" aria-labelledby="chart-title">
        <div class="section-heading">
          <h2 id="chart-title" class="chart-title">Dépenses hebdomadaires</h2>
          <button class="text-btn">Export</button>
        </div>
        <canvas id="financeChart" aria-label="Graphique des dépenses"></canvas>
      </section>

      <!-- CATEGORIES -->
      <section aria-labelledby="categories-title">
        <div class="section-heading">
          <h2 id="categories-title">Catégories</h2>
          <button class="text-btn">Voir tout</button>
        </div>

        <!-- Shopping -->
        <article class="category-item">
          <div class="category-header">
            <div class="category-label">
              <i class="fa-solid fa-cart-shopping" style="color: var(--primary)"></i>
              <span>Shopping</span>
            </div>
            <strong>€ 840</strong>
          </div>
          <div class="progress-bar-track" role="progressbar" aria-label="Shopping" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar-fill" style="width: 70%; background: var(--primary)"></div>
          </div>
        </article>

        <!-- Restaurants -->
        <article class="category-item">
          <div class="category-header">
            <div class="category-label">
              <i class="fa-solid fa-mug-hot" style="color: #f59e0b"></i>
              <span>Restaurants</span>
            </div>
            <strong>€ 430</strong>
          </div>
          <div class="progress-bar-track" role="progressbar" aria-label="Restaurants" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar-fill" style="width: 45%; background: #f59e0b"></div>
          </div>
        </article>

        <!-- Gaming -->
        <article class="category-item">
          <div class="category-header">
            <div class="category-label">
              <i class="fa-solid fa-gamepad" style="color: var(--danger)"></i>
              <span>Gaming</span>
            </div>
            <strong>€ 220</strong>
          </div>
          <div class="progress-bar-track" role="progressbar" aria-label="Gaming" aria-valuenow="30" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar-fill" style="width: 30%; background: var(--danger)"></div>
          </div>
        </article>

      </section>

    </main>

    <!-- BOTTOM NAV : utilise .nav-item comme style.css le définit -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="nav-item" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i>
        <span>Accueil</span>
      </button>
      <button class="nav-item active" aria-current="page">
        <i class="fa-solid fa-chart-pie"></i>
        <span>Analyse</span>
      </button>
      <button class="nav-item center-btn">
        <i class="fa-solid fa-plus"></i>
      </button>
      <button class="nav-item">
        <i class="fa-regular fa-bell"></i>
        <span>Alertes</span>
      </button>
      <button class="nav-item">
        <i class="fa-regular fa-user"></i>
        <span>Profil</span>
      </button>
    </nav>

  </div>

  <script>
    const ctx = document.getElementById("financeChart");

    // Dégradé pour le remplissage
    const gradient = ctx.getContext("2d").createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, "rgba(99, 91, 255, 0.35)");
    gradient.addColorStop(1, "rgba(99, 91, 255, 0.00)");

    new Chart(ctx, {
      type: "line",
      data: {
        labels: ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"],
        datasets: [{
          label: "Dépenses",
          data: [120, 190, 300, 250, 400, 350, 500],
          tension: 0.4,
          fill: true,
          backgroundColor: gradient,
          borderColor: "#635bff",
          pointBackgroundColor: "#635bff",
          pointRadius: 4,
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>

</body>
</html>
